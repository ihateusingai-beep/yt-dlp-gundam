name: Build Windows Portable .exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug working directory
        run: |
          Write-Host "=== CI DEBUG ==="
          Write-Host "CWD: $(Get-Location)"
          Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
          Write-Host "Repo root files:"
          Get-ChildItem | Select-Object Name, Length
          Write-Host "templates/ contents:"
          Get-ChildItem templates/ | Select-Object Name
          Write-Host "main.py size:"
          (Get-Item main.py).Length
          Write-Host "spec file size:"
          (Get-Item yt_dlp_gundam.spec).Length

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          Write-Host "PyInstaller version:"
          pyinstaller --version

      - name: Build with PyInstaller
        run: |
          Write-Host "CWD before pyinstaller: $(Get-Location)"
          Write-Host "imageio-ffmpeg binary path:"
          python -c "import imageio_ffmpeg; p = imageio_ffmpeg.get_ffmpeg_exe(); import os; print('PATH:', p); print('EXISTS:', os.path.exists(p)); print('SIZE:', os.path.getsize(p) if os.path.exists(p) else 0)"
          pyinstaller yt_dlp_gundam.spec --noconfirm 2>&1 | Tee-Object -FilePath pyinstaller.log
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "=== Last 30 lines of spec log ==="
          if (Test-Path pyinstaller.log) {
            Get-Content pyinstaller.log -Tail 30
          }

      - name: Check build output
        if: always()
        run: |
          Write-Host "dist/ contents:"
          if (Test-Path dist/) {
            Get-ChildItem dist/ -Recurse | Select-Object FullName, Length
          } else {
            Write-Host "dist/ does not exist"
          }
          Write-Host "build/ contents:"
          if (Test-Path build/) {
            Get-ChildItem build/ | Select-Object Name
          } else {
            Write-Host "build/ does not exist"
          }

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-gundam-win64
          path: dist/yt_dlp_gundam/
          retention-days: 30

      - name: Create zip for release
        if: github.event.inputs.tag != ''
        run: |
          Compress-Archive -Path "dist\yt_dlp_gundam" -DestinationPath "yt_dlp_gundam-win64.zip" -Force
        working-directory: ${{ github.workspace }}

      - name: Upload zip to release
        if: github.event.inputs.tag != ''
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }} — yt-dlp Gundam Dashboard
          files: yt_dlp_gundam-win64.zip
          draft: true